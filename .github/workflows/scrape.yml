name: Oran Guncelleme
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
jobs:
  veri-cek:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install soccerapi
      - run: python scraper.py
      - name: Veriyi Otomatik Yukle
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Güncelleme"
          file_pattern: "oranlar.json"
