name: Oran Guncelleme
on:
  schedule:
    - cron: '0 0 */3 * *' # Her 3 günde bir gece yarısı çalışır
  workflow_dispatch:
jobs:
  veri-cek:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python scraper.py
      - name: Guncellemeyi Oto-Kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 3 Gunluk Dev Guncelleme"
          file_pattern: "oranlar.json"
          push_options: '--force'
