name: Oran Guncelleme
on:
  schedule:
    - cron: '0 */12 * * *' # Günde sadece 2 kez (Kotayı korumak için)
  workflow_dispatch: # Sizin elinizle başlatmanız için (Her istediğinizde)
jobs:
  veri-cek:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python scraper.py
      - name: Guncellemeyi Oto-Kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 12 Saatlik Dev Guncelleme"
          file_pattern: "oranlar.json"
          push_options: '--force'
